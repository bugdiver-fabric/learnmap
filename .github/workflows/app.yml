name: App

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'

permissions:
  contents: write

concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  verify:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: app
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-dev:
    name: Deploy Dev
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: .
    steps:
      - name: Trigger Render dev deploy
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_APP }}

      - name: Wait for dev app
        run: |
          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error --output /dev/null "$APP_URL"; then
              echo "Dev app is live"
              exit 0
            fi
            echo "Waiting for dev app... (${attempt}/36)"
            sleep 10
          done
          echo "Dev app did not become reachable in time"
          exit 1
        env:
          APP_URL: ${{ secrets.LEARNMAP_APP_URL }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            app
            scripts

      - name: Tag dev deployment
        working-directory: .
        run: bash scripts/git-tag-deployment.sh dev app

  approve-production:
    name: Approve production deploy
    needs: deploy-dev
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: .
    steps:
      - run: echo "Dev deploy succeeded — proceeding to production"

  deploy-prod:
    name: Deploy Production
    needs: approve-production
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: .
    steps:
      - name: Trigger Render production deploy
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_APP }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            app
            scripts

      - name: Tag production deployment
        working-directory: .
        run: bash scripts/git-tag-deployment.sh prod app
