name: App CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  lint-test-build:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional --no-workspaces

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
