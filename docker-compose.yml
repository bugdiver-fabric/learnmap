services:
  postgres:
    image: postgres:16-alpine
    container_name: learnmap-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: learnmap
      POSTGRES_PASSWORD: learnmap
      POSTGRES_DB: learnmap
    volumes:
      - learnmap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U learnmap -d learnmap']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: learnmap-api
    restart: unless-stopped
    working_dir: /app
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://learnmap:learnmap@postgres:5432/learnmap
      SEED_DATABASE: ${SEED_DATABASE:-false}
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    container_name: learnmap-app
    restart: unless-stopped
    working_dir: /app
    ports:
      - '5173:5173'
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  learnmap_pgdata:
